name: erp-bem-comum-qa

# Stack de QA (PBE — ADR-0021) numa única VPS Magalu BV1-2-20 (1 vCPU / 2 GB / 20 GB).
# As imagens (core-api e web/BFF) são buildadas no GitHub Actions e publicadas no
# ghcr; esta VPS NUNCA compila — só faz pull (CORE_API_IMAGE/WEB_IMAGE) e sobe.
# Limites de memória apertados para caber mysql+core-api+web+caddy em 2 GB + 2 GB
# de swap (cloud-init). O front (web) é a borda pública; o browser nunca fala com o
# core-api direto — só via as server functions do web (BFF). Caddy → web → core-api.

x-logging: &logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  mysql:
    image: mysql:8.4@sha256:c36050afdca850f23cef85703f84c7531a5ae155a11b5ee1c60acb09937c4084
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: core
      MYSQL_USER: core_app
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_app_password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --authentication-policy=caching_sha2_password
      - --innodb-buffer-pool-size=160M
      - --max-connections=30
    volumes:
      - mysql-data:/var/lib/mysql
    secrets:
      - mysql_root_password
      - mysql_app_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$(cat /run/secrets/mysql_root_password) --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    mem_limit: 576m
    logging: *logging
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  core-api:
    image: ${CORE_API_IMAGE:?defina CORE_API_IMAGE}
    restart: unless-stopped
    # As migrations rodam no serviço one-off `core-api-migrate` (job dedicado, #211) ANTES
    # deste container subir (depends_on service_completed_successfully) — NÃO mais no boot.
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        export MYSQL_APP_PASSWORD="$$(cat /run/secrets/mysql_app_password)"
        DB_URL="mysql://core_app:$${MYSQL_APP_PASSWORD}@mysql:3306/core"
        export AUTH_DATABASE_URL="$${DB_URL}"
        export PARTNERS_DATABASE_URL="$${DB_URL}"
        export CONTRACTS_DATABASE_URL="$${DB_URL}"
        export PROGRAMS_DATABASE_URL="$${DB_URL}"
        export FINANCIAL_DATABASE_URL="$${DB_URL}"
        export AUTH_JWT_PRIVATE_KEY="$$(cat /run/secrets/auth_jwt_private_key)"
        export AUTH_JWT_PUBLIC_KEY="$$(cat /run/secrets/auth_jwt_public_key)"
        export S3_ACCESS_KEY_ID="$$(cat /run/secrets/s3_access_key_id)"
        export S3_SECRET_ACCESS_KEY="$$(cat /run/secrets/s3_secret_access_key)"
        if [ -s /run/secrets/smtp_pass ]; then export SMTP_PASS="$$(cat /run/secrets/smtp_pass)"; fi
        exec node src/server.ts
    environment:
      PORT: "3000"
      HOST: 0.0.0.0
      NODE_OPTIONS: --experimental-strip-types --no-warnings --max-old-space-size=300
      AUTH_DRIVER: mysql
      PARTNERS_DRIVER: mysql
      CONTRACTS_DRIVER: mysql
      PROGRAMS_DRIVER: mysql
      FINANCIAL_DRIVER: mysql
      AUTH_RESET_BASE_URL: ${APP_URL:?defina APP_URL}
      AUTH_LOGIN_RATE_LIMIT_MAX: ${AUTH_LOGIN_RATE_LIMIT_MAX:-5}
      AUTH_LOGIN_RATE_LIMIT_WINDOW: ${AUTH_LOGIN_RATE_LIMIT_WINDOW:-1 minute}
      # Atrás do Caddy na mesma rede docker — confiar nos X-Forwarded-*.
      TRUST_PROXY: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Storage de documentos (contracts — ADR-0019/0021). Object-storage da Magalu (S3-compat).
      S3_REGION: ${S3_REGION:-br-ne1}
      S3_BUCKET: ${S3_BUCKET:?defina S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT:-https://br-ne1.magaluobjects.com}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      # E-mail (convite/reset — ADR-0010). Nodemailer ativa quando SMTP_* + *_FROM presentes;
      # ausentes → mailer no-op (não envia). SMTP_PASS vem por secret.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      AUTH_INVITE_FROM: ${AUTH_INVITE_FROM:-}
      AUTH_RESET_FROM: ${AUTH_RESET_FROM:-}
    depends_on:
      mysql:
        condition: service_healthy
      # Espera as migrations concluírem (exit 0) antes de subir o servidor (#211).
      core-api-migrate:
        condition: service_completed_successfully
    secrets:
      - mysql_app_password
      - auth_jwt_private_key
      - auth_jwt_public_key
      - s3_access_key_id
      - s3_secret_access_key
      - smtp_pass
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 90s
    mem_limit: 512m
    logging: *logging
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  # Migrations (one-off) — aplica as migrations Drizzle de TODOS os módulos no banco único
  # `core` ANTES do core-api subir. Desde o #211 o migrate saiu do boot do core-api e virou
  # este job (`src/jobs/migrate/run.ts`, lê MIGRATE_DATABASE_URL). Reusa a MESMA imagem do
  # core-api (já no ghcr — não builda aqui). Idempotente: a cada deploy aplica só as pendentes.
  core-api-migrate:
    image: ${CORE_API_IMAGE:?defina CORE_API_IMAGE}
    restart: "no"
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        export MYSQL_APP_PASSWORD="$$(cat /run/secrets/mysql_app_password)"
        export MIGRATE_DATABASE_URL="mysql://core_app:$${MYSQL_APP_PASSWORD}@mysql:3306/core"
        exec node src/jobs/migrate/run.ts
    environment:
      # Roda o .ts via strip-types (mesma do core-api); banco único (ADR-0014) migra todos os módulos.
      NODE_OPTIONS: --experimental-strip-types --no-warnings --max-old-space-size=256
    depends_on:
      mysql:
        condition: service_healthy
    secrets:
      - mysql_app_password
    mem_limit: 320m
    logging: *logging
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  # ─────────────────────────────────────────────────────────────────────────────
  # Workers long-running — 5 processos que processam o outbox e mantêm
  # as projeções de read-model. Cada worker usa a MESMA imagem do core-api
  # (buildada no CI, publicada no ghcr) e roda um script .ts diferente.
  #
  # Padrão de injeção de DATABASE_URL: idêntico ao core-api — lê mysql_app_password
  # do secret file e constrói a URL inline. Banco único `core` (ADR-0020): todas as
  # *_DATABASE_URL apontam para mysql:3306/core (sem isolamento de schema em QA).
  #
  # depends_on: core-api healthy (garante transitivamente MySQL healthy + migrations
  # concluídas via core-api-migrate). Sem healthcheck HTTP (workers são long-running
  # sem borda HTTP — Docker os considera "running" assim que o processo não crasha).
  #
  # Nota de memória (VPS BV1-2-20, 2 GB RAM + 2 GB swap): os 5 workers somam ~960 MB
  # de mem_limit (4×192 m + 1×256 m) além do baseline (mysql+core-api+web+caddy ≈1608 m),
  # totalizando ~2568 MB. Dentro da RAM+swap (4 GB total), mas headroom reduzido.
  # Monitorar com `docker stats --no-stream`.
  # ─────────────────────────────────────────────────────────────────────────────

  core-api-outbox-contracts:
    image: ${CORE_API_IMAGE:?defina CORE_API_IMAGE}
    restart: unless-stopped
    # Workers não expõem HTTP — o HEALTHCHECK herdado da imagem (fetch em :3000/health)
    # sempre falharia ("unhealthy") e o `up --wait` do deploy.sh sairia != 0 (deploy
    # vermelho). Substituído por liveness leve que passa enquanto o container roda;
    # processo morto = restart policy (unless-stopped) reergue.
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 3s
      retries: 2
      start_period: 5s
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        export MYSQL_APP_PASSWORD="$$(cat /run/secrets/mysql_app_password)"
        DB_URL="mysql://core_app:$${MYSQL_APP_PASSWORD}@mysql:3306/core"
        export CONTRACTS_DATABASE_URL="$${DB_URL}"
        exec node src/modules/contracts/worker/run.ts
    environment:
      NODE_OPTIONS: --experimental-strip-types --no-warnings --max-old-space-size=128
    depends_on:
      mysql:
        condition: service_healthy
      core-api:
        condition: service_healthy
    secrets:
      - mysql_app_password
    mem_limit: 192m
    logging: *logging
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  core-api-outbox-partners:
    image: ${CORE_API_IMAGE:?defina CORE_API_IMAGE}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 3s
      retries: 2
      start_period: 5s
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        export MYSQL_APP_PASSWORD="$$(cat /run/secrets/mysql_app_password)"
        DB_URL="mysql://core_app:$${MYSQL_APP_PASSWORD}@mysql:3306/core"
        export PARTNERS_DATABASE_URL="$${DB_URL}"
        exec node src/modules/partners/worker/run.ts
    environment:
      NODE_OPTIONS: --experimental-strip-types --no-warnings --max-old-space-size=128
    depends_on:
      mysql:
        condition: service_healthy
      core-api:
        condition: service_healthy
    secrets:
      - mysql_app_password
    mem_limit: 192m
    logging: *logging
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  core-api-supplier-projection:
    image: ${CORE_API_IMAGE:?defina CORE_API_IMAGE}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 3s
      retries: 2
      start_period: 5s
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        export MYSQL_APP_PASSWORD="$$(cat /run/secrets/mysql_app_password)"
        DB_URL="mysql://core_app:$${MYSQL_APP_PASSWORD}@mysql:3306/core"
        export PARTNERS_DATABASE_URL="$${DB_URL}"
        export FINANCIAL_DATABASE_URL="$${DB_URL}"
        exec node src/workers/supplier-view-projection/run.ts
    environment:
      NODE_OPTIONS: --experimental-strip-types --no-warnings --max-old-space-size=128
    depends_on:
      mysql:
        condition: service_healthy
      core-api:
        condition: service_healthy
    secrets:
      - mysql_app_password
    mem_limit: 192m
    logging: *logging
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  core-api-contract-count-projection:
    image: ${CORE_API_IMAGE:?defina CORE_API_IMAGE}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 3s
      retries: 2
      start_period: 5s
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        export MYSQL_APP_PASSWORD="$$(cat /run/secrets/mysql_app_password)"
        DB_URL="mysql://core_app:$${MYSQL_APP_PASSWORD}@mysql:3306/core"
        export CONTRACTS_DATABASE_URL="$${DB_URL}"
        export PARTNERS_DATABASE_URL="$${DB_URL}"
        exec node src/workers/contract-count-projection/run.ts
    environment:
      NODE_OPTIONS: --experimental-strip-types --no-warnings --max-old-space-size=128
    depends_on:
      mysql:
        condition: service_healthy
      core-api:
        condition: service_healthy
    secrets:
      - mysql_app_password
    mem_limit: 192m
    logging: *logging
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  core-api-email-dispatch:
    image: ${CORE_API_IMAGE:?defina CORE_API_IMAGE}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 3s
      retries: 2
      start_period: 5s
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        export MYSQL_APP_PASSWORD="$$(cat /run/secrets/mysql_app_password)"
        DB_URL="mysql://core_app:$${MYSQL_APP_PASSWORD}@mysql:3306/core"
        export AUTH_DATABASE_URL="$${DB_URL}"
        export PARTNERS_DATABASE_URL="$${DB_URL}"
        if [ -s /run/secrets/smtp_pass ]; then export SMTP_PASS="$$(cat /run/secrets/smtp_pass)"; fi
        exec node src/workers/email-dispatch/run.ts
    environment:
      NODE_OPTIONS: --experimental-strip-types --no-warnings --max-old-space-size=128
      EMAIL_PROVIDER: smtp
      EMAIL_FROM: ${EMAIL_FROM:-}
      # Amazon SES via SMTP (sandbox em QA — destinatários verificados).
      # Configurar SMTP_HOST=email-smtp.<região>.amazonaws.com no .env.
      # Sem SMTP_HOST/USER → Nodemailer no-op (worker sobe mas não envia e-mail).
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
    depends_on:
      mysql:
        condition: service_healthy
      core-api:
        condition: service_healthy
    secrets:
      - mysql_app_password
      - smtp_pass
    mem_limit: 256m
    logging: *logging
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  # Front + BFF (TanStack Start). Borda pública via Caddy; consome o core-api na rede
  # interna (CORE_API_URL). Boot exige só CORE_API_URL (ver src/external/config/env.config.ts).
  web:
    image: ${WEB_IMAGE:?defina WEB_IMAGE}
    restart: unless-stopped
    environment:
      CORE_API_URL: http://core-api:3000/api/v2
      PORT: "3000"
      HOST: 0.0.0.0
      NODE_OPTIONS: --max-old-space-size=288
    depends_on:
      core-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    mem_limit: 448m
    # Hardening do front distroless non-root (web-app ADR-0015 / CIS Docker-Bench — issue #3):
    # o runtime só escreve em /tmp e liga na :3000 (não privilegiada) → FS read-only + sem capabilities.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    pids_limit: 256
    logging: *logging
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  caddy:
    image: caddy:2-alpine@sha256:77c07d5ebfa5be9fd6c820d2094ae662c9e7eeb9bf98346b7f639900263ee2a2
    restart: unless-stopped
    environment:
      APP_ADDRESS: ${APP_ADDRESS:?defina APP_ADDRESS}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      web:
        condition: service_healthy
    mem_limit: 72m
    logging: *logging
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  # Job one-shot — expira contratos vencidos (src/jobs/contracts/sweeper/run.ts).
  # O agendamento (1×/dia, 00:05 America/Sao_Paulo) é EXTERNO a este compose:
  # um systemd timer ou ofelia na VPS dispara `docker compose run --rm core-api-sweeper`.
  # Este service apenas define imagem + entrypoint; NÃO é iniciado pelo `compose up`
  # (profile "sweeper" opt-in). restart: "no" — one-shot puro; retry = próximo tick do cron.
  core-api-sweeper:
    image: ${CORE_API_IMAGE:?defina CORE_API_IMAGE}
    restart: "no"
    profiles:
      - sweeper
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        export MYSQL_APP_PASSWORD="$$(cat /run/secrets/mysql_app_password)"
        export CONTRACTS_DATABASE_URL="mysql://core_app:$${MYSQL_APP_PASSWORD}@mysql:3306/core"
        exec node src/jobs/contracts/sweeper/run.ts
    environment:
      NODE_OPTIONS: --experimental-strip-types --no-warnings --max-old-space-size=128
    depends_on:
      mysql:
        condition: service_healthy
      core-api-migrate:
        condition: service_completed_successfully
    secrets:
      - mysql_app_password
    mem_limit: 192m
    logging: *logging
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

secrets:
  mysql_root_password:
    file: ./secrets/mysql-root-password
  mysql_app_password:
    file: ./secrets/mysql-app-password
  auth_jwt_private_key:
    file: ./secrets/auth-jwt-private-key.pem
  auth_jwt_public_key:
    file: ./secrets/auth-jwt-public-key.pem
  s3_access_key_id:
    file: ./secrets/s3-access-key-id
  s3_secret_access_key:
    file: ./secrets/s3-secret-access-key
  smtp_pass:
    file: ./secrets/smtp-pass

volumes:
  mysql-data:
  caddy-data:
  caddy-config:

networks:
  internal:
    driver: bridge
