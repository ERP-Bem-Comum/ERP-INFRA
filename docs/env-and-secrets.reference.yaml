# =============================================================================
# ERP Bem Comum — Catálogo de variáveis de ambiente & secrets (frontend + backend)
# =============================================================================
# Fonte de verdade: CÓDIGO REAL (não chute) —
#   • web-app  (front + BFF)  → branch `origin/develop`  (src/external/config/env.config.ts + process.env)
#   • core-api (backend)      → branch `origin/dev`       (server.ts, shared/http/config.ts, módulos)
# Gerado em: 2026-06-25. Mantenha sincronizado quando o código mudar (este arquivo é referência p/ a infra).
#
# POR QUE ISSO EXISTE: em 2026-06-25 o login de prod quebrou porque o CORE_API_URL do web-app estava SEM
# `/api` → 404 → "server". Este catálogo evita que falte/erre qualquer env de novo. Cada item diz o que é,
# pra que serve, se é secret, se é obrigatória, formato e quem lê.
#
# -----------------------------------------------------------------------------
# COMO LER CADA ITEM:
#   secret:    true  → credencial/chave/senha. NUNCA em git, imagem Docker, log ou env em texto plano.
#                      Injetar via Docker secret (/run/secrets/...) ou Secret Manager da cloud.
#   required:  true | false | "condicional: <quando>"
#   default:   valor assumido se ausente (quando houver)
#   purpose:   o que faz / como funciona
#   format:    formato esperado + exemplo SEGURO (nunca valor real de segredo)
#   read_by:   onde o código lê
#
# REGRAS DE OURO (segurança — ADR-0003/0005/0006/0014/0018):
#   1. Segredo nunca em git/imagem/log. Em dev/QA via Docker secrets; em prod via Secret Manager da cloud.
#   2. O web-app (BFF) NÃO tem segredo de RUNTIME. O token vive no core-api; o cookie `__Host-session`
#      carrega só um sessionId OPACO (store in-memory server-side). Não procure JWT/SESSION secret no front.
#   3. O browser fala só com o BFF (mesma origem). CORS no core-api só é necessário p/ OUTROS consumidores.
#   4. Rotacionar segredos periodicamente (chaves JWT, senhas DB, SMTP, auth key do tailnet — issue web-app#92).
# =============================================================================

meta:
  gerado_em: "2026-06-25"
  fontes:
    web_app: "web-app @ origin/develop"
    core_api: "core-api @ origin/dev"
  confirmar_ao_vivo:
    core_api_openapi: "GET /docs/json no core-api (só quando NODE_ENV != production) lista os contratos."

# #############################################################################
# 1) FRONTEND — web-app (front + BFF, TanStack Start + Nitro)
# #############################################################################
frontend_web_app:
  descricao: >
    Front + BFF unificado. É a única borda pública (o browser nunca chama o core-api direto). NÃO tem
    segredo de runtime. O ÚNICO contrato de env obrigatório do app é CORE_API_URL.

  runtime:
    CORE_API_URL:
      secret: false
      required: true
      purpose: >
        Base do core-api que o BFF chama (server-to-server). v1 e v2 derivam DESTA base via coreApiBase()
        (ADR-0033). Trocar o DNS = trocar esta env + reiniciar, SEM recompilar (ADR-0020).
      format: "https://host/api  (ou https://host/api/v2). ⚠️ DEVE INCLUIR /api — senão coreApiBase deriva {host}/v2 e /auth/* dá 404 → erro 'server'. Validado fail-fast no boot (refine Zod)."
      example: "https://erp-bem-comum-api.codebit.biz/api/v2   |   http://core-api:3000/api/v2 (interno)"
      read_by: "src/external/config/env.config.ts (EnvSchema) → todo o BFF"
      notes: "NUNCA usar prefixo VITE_ (iria pro bundle do browser). Server-only."
    PORT:        { secret: false, required: false, default: "3000", purpose: "Porta do servidor Nitro." }
    HOST:        { secret: false, required: false, default: "0.0.0.0", purpose: "Interface de bind do servidor." }
    NODE_ENV:    { secret: false, required: false, default: "production (setado na imagem)", purpose: "Modo de execução." }
    LOG_LEVEL:   { secret: false, required: false, default: "info", purpose: "Nível do logger pino. Lido direto de process.env (fora do EnvSchema p/ funcionar mesmo se a config quebrar — ADR-0014)." }
    NODE_OPTIONS: { secret: false, required: false, default: "--max-old-space-size=384 (imagem); compose QA usa 288", purpose: "Cap de heap p/ caber no envelope de RAM do container." }

  deploy_ci:  # NÃO são runtime — vivem no GitHub Actions (CI/CD), não na VPS.
    TS_AUTHKEY:
      secret: true
      required: "true (no job de deploy QA)"
      purpose: "Auth key do Tailscale (tag:ci) — o runner do CI entra no tailnet p/ fazer SSH na VPS, SEM chave longeva (ADR-0018)."
      format: "tskey-... (reusable + ephemeral + preauthorized). ⚠️ EXPIRA ~90 dias → rotacionar (web-app issue #92)."
      where: "GitHub Secrets do repo web-app"
    GITHUB_TOKEN:
      secret: true
      required: "automático"
      purpose: "Token efêmero do Actions (push no GHCR + attestations OIDC). Gerado pelo GitHub — NÃO setar manualmente."
      where: "injetado pelo GitHub Actions"

  NAO_EXISTEM:  # listados por engano em docs antigos (handbook secrets-catalog); NÃO existem no código do web-app.
    - "JWT_SIGNING_KEY  — o web-app NÃO assina JWT (quem assina é o core-api)."
    - "SESSION_SECRET   — a sessão é store in-memory com sessionId opaco; não há HMAC por env."
    - "OIDC_CLIENT_ID / OIDC_CLIENT_SECRET — não há fluxo OIDC no web-app hoje."

# #############################################################################
# 2) BACKEND — core-api (Modular Monolith, Node 24 · Fastify)
# #############################################################################
# Não há schema central: parsers puros por módulo leem process.env. Banco é UM só (`core`) com isolamento
# lógico por módulo; cada módulo lê SUA connection string. Driver por módulo seleciona mysql vs in-memory:
# sem `<MOD>_DRIVER=mysql` + a URL, o módulo sobe IN-MEMORY (degradado, NÃO persiste). No compose os 5
# drivers são setados =mysql.
backend_core_api:

  # ---- 2.1 Banco de dados (MySQL 8.4) --------------------------------------
  # Formato comum: mysql://<user>:<pass>@<host>:3306/core?ssl-mode=REQUIRED  (ssl em prod). TODAS secret.
  banco_de_dados:
    AUTH_DATABASE_URL:
      secret: true
      required: "condicional: obrigatória se AUTH_DRIVER=mysql; obrigatória no worker email-dispatch"
      purpose: "Pool RW do módulo auth (usuários, RBAC, refresh tokens, auth_outbox)."
      format: "mysql://core_app:***@mysql:3306/core?ssl-mode=REQUIRED"
      read_by: "server.ts, workers/email-dispatch"
    PARTNERS_DATABASE_URL:
      secret: true
      required: "condicional: PARTNERS_DRIVER=mysql; obrigatória nos workers de projeção/backfill"
      purpose: "Writer do módulo partners (colaboradores, fornecedores, financiadores, par_email_outbox)."
    PARTNERS_READER_URL:
      secret: true
      required: false
      default: "ausente → reusa o writer"
      purpose: "Réplica de LEITURA do partners (split RW — ADR-0026)."
    CONTRACTS_DATABASE_URL:
      secret: true
      required: "condicional: CONTRACTS_DRIVER=mysql; obrigatória nos workers outbox/contagem"
      purpose: "Writer do módulo contratos (ctr_contracts, ctr_outbox)."
    CONTRACTS_READER_URL:
      secret: true
      required: false
      default: "ausente → reusa o writer"
      purpose: "Réplica de leitura do contracts."
    CONTRACTS_DATABASE_URL_FILE:
      secret: true
      required: false
      purpose: "SÓ no job sweeper: path de um Docker secret com a connection string (lida via readFileSync)."
      notes: "Mutuamente exclusiva com CONTRACTS_DATABASE_URL (ambas → erro de boot do job)."
    PROGRAMS_DATABASE_URL:
      secret: true
      required: "condicional: PROGRAMS_DRIVER=mysql"
      purpose: "Writer do módulo programs. Também usado por contracts (numeração); falha aqui DEGRADA, não derruba o boot."
    FINANCIAL_DATABASE_URL:
      secret: true
      required: "condicional: FINANCIAL_DRIVER=mysql; obrigatória nos workers supplier-projection/backfill"
      purpose: "Writer do módulo financial (/api/v2/financial, fin_supplier_view)."
    MIGRATE_DATABASE_URL:
      secret: true
      required: "true (no job `migrate`; ausente → exit 78)"
      purpose: "Connection string única que roda as migrations dos 6 módulos. Job one-shot ANTES do http/workers. NÃO suporta _FILE."
    drivers:
      secret: false
      required: false
      default: "qualquer valor != 'mysql' (inclusive ausente) → memory (in-memory, NÃO persiste)"
      vars: [AUTH_DRIVER, PARTNERS_DRIVER, CONTRACTS_DRIVER, PROGRAMS_DRIVER, FINANCIAL_DRIVER]
      purpose: "Selecionam mysql vs in-memory por módulo. Em prod/QA: setar TODOS = mysql."

  # ---- 2.2 JWT / Auth ------------------------------------------------------
  jwt_auth:
    AUTH_JWT_PRIVATE_KEY:
      secret: true
      required: "obrigatória em PROD (ausente → par efêmero no boot; tokens não sobrevivem a restart)"
      purpose: "Chave PRIVADA ES256 (PKCS8 PEM) que assina os access/refresh JWT (jose.importPKCS8 'ES256')."
      format: "-----BEGIN PRIVATE KEY-----\\n...\\n-----END PRIVATE KEY----- (ES256 / P-256)"
      read_by: "modules/auth/adapters/http/composition.ts"
    AUTH_JWT_PUBLIC_KEY:
      secret: false
      required: "par com a privada (só usa o par do env se AMBAS presentes)"
      purpose: "Chave PÚBLICA ES256 (SPKI PEM) que verifica os JWT (jose.importSPKI 'ES256')."
      format: "-----BEGIN PUBLIC KEY-----\\n...\\n-----END PUBLIC KEY-----"
    AUTH_LOGIN_RATE_LIMIT_MAX:    { secret: false, required: false, default: "5", purpose: "Limite dedicado de login/refresh por janela (BE-REC-001)." }
    AUTH_LOGIN_RATE_LIMIT_WINDOW: { secret: false, required: false, default: "'1 minute'", purpose: "Janela do limite de login (string estilo @fastify/rate-limit)." }
    AUTH_RESET_BASE_URL:
      secret: false
      required: false
      default: "http://localhost:3000/reset-password"
      purpose: "Base do link de reset de senha no e-mail (nunca usa o header Host — BE-REC-003). Em prod: a URL pública do FRONT."
      example: "https://erp-bem-comum.codebit.biz/reset-password"
    CORE_API_E2E:
      secret: false
      required: false
      purpose: "Guarda de teste: o seed RBAC por env só é lido se == '1'. ⚠️ NUNCA setar em prod (inerte se != '1')."
    AUTH_SEED_JSON:
      secret: true
      required: false
      purpose: "JSON de usuários/RBAC p/ semear E2E (só com CORE_API_E2E=1). Contém SENHAS de seed. ⚠️ Nunca em prod."

  # ---- 2.3 Object storage / S3 (documentos, foto de perfil, logo de programa) ----
  # Regra de credenciais (XOR): ACCESS_KEY+SECRET ambos presentes → credencial estática (MinIO/Magalu/dev);
  # ambos ausentes → provider chain (IAM Role ECS/IMDS em prod AWS); só um → config pela metade (erro).
  object_storage:
    # 2.3a S3_* — documentos de contrato E foto de perfil (compartilhado)
    S3_ENDPOINT:          { secret: false, required: "condicional", default: "contracts: https://s3.<region>.amazonaws.com", purpose: "Endpoint do bucket (AWS S3 / MinIO / Magalu)." }
    S3_REGION:            { secret: false, required: "⚠️ OBRIGATÓRIA se CONTRACTS_DRIVER=mysql (lança no boot)", default: "auth-foto: us-east-1", purpose: "Região do bucket." }
    S3_BUCKET:            { secret: false, required: "⚠️ OBRIGATÓRIA se CONTRACTS_DRIVER=mysql", purpose: "Nome do bucket de documentos/fotos." }
    S3_ACCESS_KEY_ID:     { secret: true,  required: "XOR com secret (estática) — ausente+secret ausente = IAM Role", purpose: "Access key estática." }
    S3_SECRET_ACCESS_KEY: { secret: true,  required: "XOR com key", purpose: "Secret access key estática." }
    S3_FORCE_PATH_STYLE:  { secret: false, required: false, default: "false (AWS); true p/ localhost/MinIO", purpose: "Path-style vs virtual-hosted (MinIO exige path-style)." }
    # 2.3b PROGRAMS_LOGO_S3_* — storage próprio do logo de programa (sem endpoint+bucket → in-memory)
    PROGRAMS_LOGO_S3_ENDPOINT:          { secret: false, required: "mínimo (com bucket)", purpose: "Endpoint do bucket de logos de programa." }
    PROGRAMS_LOGO_S3_BUCKET:            { secret: false, required: "mínimo (com endpoint)", purpose: "Bucket dos logos." }
    PROGRAMS_LOGO_S3_REGION:            { secret: false, required: false, default: "us-east-1", purpose: "Região." }
    PROGRAMS_LOGO_S3_ACCESS_KEY_ID:     { secret: true,  required: "XOR", purpose: "Access key estática." }
    PROGRAMS_LOGO_S3_SECRET_ACCESS_KEY: { secret: true,  required: "XOR", purpose: "Secret estático." }
    PROGRAMS_LOGO_S3_FORCE_PATH_STYLE:  { secret: false, required: false, default: "true", purpose: "Path-style." }
    # 2.3c MAGALU_* — DISPONÍVEL, mas NÃO wired no boot atual (o servidor usa S3_*). Documentado p/ futuro.
    MAGALU_BUCKET:            { secret: false, required: "n/a (não wired)", purpose: "[futuro] Bucket no Magalu Object Storage." }
    MAGALU_ACCESS_KEY_ID:     { secret: true,  required: "n/a (não wired)", purpose: "[futuro] API Key Magalu (access)." }
    MAGALU_SECRET_ACCESS_KEY: { secret: true,  required: "n/a (não wired)", purpose: "[futuro] API Key Magalu (secret)." }
    MAGALU_REGION:            { secret: false, required: false, default: "br-ne1 (válidos: br-ne1, br-se1)", purpose: "[futuro] Região → endpoint https://<region>.magaluobjects.com." }

  # ---- 2.4 E-mail / SMTP (módulo notifications) ----------------------------
  # Config 100% por env (ADR-0010); inválida = boot falha. Sem SMTP_* válidos e sem EMAIL_PROVIDER → 'memory' (no-op).
  email_smtp:
    EMAIL_PROVIDER:          { secret: false, required: false, default: "smtp se SMTP_* válidos, senão memory", purpose: "Seletor: smtp | resend | memory (memory = no-op, não envia)." }
    SMTP_HOST:               { secret: false, required: "condicional (provider=smtp)", purpose: "Host SMTP.", example: "smtp.umbler.com" }
    SMTP_PORT:               { secret: false, required: "condicional (smtp)", purpose: "Porta SMTP (587 STARTTLS / 465 TLS)." }
    SMTP_SECURE:             { secret: false, required: "condicional (smtp)", purpose: "'true' = TLS implícito (465); senão STARTTLS." }
    SMTP_USER:               { secret: false, required: "condicional (smtp)", purpose: "Usuário SMTP (sensível, mas não tratado como secret)." }
    SMTP_PASS:               { secret: true,  required: "condicional (smtp)", purpose: "Senha SMTP." }
    SMTP_POOL:               { secret: false, required: false, default: "true", purpose: "Pool de conexões SMTP (só 'false' desliga)." }
    SMTP_MAX_CONNS:          { secret: false, required: false, default: "5", purpose: "Máx. conexões do pool." }
    RESEND_API_KEY:          { secret: true,  required: "condicional (provider=resend)", purpose: "API key do Resend." }
    EMAIL_FROM:              { secret: false, required: "condicional (provider != memory)", purpose: "Remetente global (fallback dos demais). Malformado → boot falha.", format: "\"Bem Comum <no-reply@dominio>\"" }
    EMAIL_FROM_RESET:        { secret: false, required: false, default: "→ EMAIL_FROM", purpose: "Remetente do reset de senha (alias legado: AUTH_RESET_FROM)." }
    EMAIL_FROM_INVITE:       { secret: false, required: false, default: "→ EMAIL_FROM", purpose: "Remetente de convite (alias legado: AUTH_INVITE_FROM)." }
    EMAIL_FROM_NOTIFICATION: { secret: false, required: false, default: "→ EMAIL_FROM", purpose: "Remetente de notificações." }
    AUTH_RESET_FROM:         { secret: false, required: false, purpose: "[DEPRECADO] alias legado de EMAIL_FROM_RESET (só lido se o novo ausente)." }
    AUTH_INVITE_FROM:        { secret: false, required: false, purpose: "[DEPRECADO] alias legado de EMAIL_FROM_INVITE." }
    EMAIL_SANDBOX_TO:        { secret: false, required: false, purpose: "SÓ não-prod: redireciona TODO e-mail p/ esta caixa. ⚠️ Nunca em prod." }

  # ---- 2.5 Borda HTTP / runtime / CORS / proxy -----------------------------
  http_runtime_cors:
    PORT:                 { secret: false, required: false, default: "3000", purpose: "Porta do servidor HTTP." }
    HOST:                 { secret: false, required: false, default: "0.0.0.0", purpose: "Interface de bind." }
    CORS_ORIGINS:         { secret: false, required: false, default: "vazio (nega CORS)", purpose: "CSV de origens permitidas (credentials:true). Só p/ consumidores != BFF (mobile/integrações)." }
    RATE_LIMIT_MAX:       { secret: false, required: false, default: "200", purpose: "Máx. requests por janela (rate-limit global)." }
    RATE_LIMIT_WINDOW:    { secret: false, required: false, default: "'1 minute'", purpose: "Janela do rate-limit global." }
    TRUST_PROXY:          { secret: false, required: false, default: "true", purpose: "Confiança em X-Forwarded-* (core atrás do Caddy/BFF). Em prod: preferir o CIDR do proxy, não 'true'." }
    REQUEST_TIMEOUT_MS:   { secret: false, required: false, default: "30000", purpose: "Timeout de request lenta (anti-slowloris)." }
    KEEP_ALIVE_TIMEOUT_MS: { secret: false, required: false, default: "72000", purpose: "Keep-alive de conexão ociosa." }
    LOG_LEVEL:            { secret: false, required: false, default: "warn", purpose: "Nível do pino (redact de credenciais embutido)." }
    NODE_ENV:             { secret: false, required: false, default: "production (Dockerfile)", purpose: "Se != production, EXPÕE /docs e /docs/json (OpenAPI). Em prod a doc NÃO sobe." }
    NODE_OPTIONS:         { secret: false, required: false, default: "--experimental-strip-types --no-warnings (Dockerfile)", purpose: "Habilita strip-types nativo do Node 24 (.ts direto)." }

  # ---- 2.6 Outbox / workers (long-running) e jobs (one-shot) ---------------
  outbox_workers_jobs:
    OUTBOX_BATCH_SIZE:    { secret: false, required: false, default: "10", purpose: "Tamanho do lote por poll do outbox (workers outbox-contracts/partners)." }
    OUTBOX_MAX_ATTEMPTS:  { secret: false, required: false, default: "5", purpose: "Máx. tentativas por mensagem antes de marcar falha." }
    OUTBOX_POLL_MS:       { secret: false, required: false, default: "100", purpose: "Intervalo de poll quando há trabalho." }
    OUTBOX_IDLE_SLEEP_MS: { secret: false, required: false, default: "500", purpose: "Sleep quando a fila está vazia." }
    OUTBOX_CONSUMER_ID:   { secret: false, required: false, default: "outbox-logger-default", purpose: "Identificador do consumer." }
    OUTBOX_LOG_FILE:      { secret: false, required: false, purpose: "Path do JSONL de log de delivery (ausente → sem arquivo)." }
    SWEEP_BATCH_SIZE:     { secret: false, required: false, default: "500", purpose: "Teto do lote do job sweeper de auto-expire de contratos." }

# #############################################################################
# 3) INFRA COMPARTILHADA (compose host-side) — NÃO lidas pelo app Node
# #############################################################################
infra_compartilhada:
  mysql_container:  # senhas vêm de Docker secrets → aparecem como *_FILE
    MYSQL_ROOT_PASSWORD_FILE: { secret: true,  purpose: "/run/secrets/mysql_root_password — senha root do MySQL." }
    MYSQL_DATABASE:           { secret: false, default: "core", purpose: "Database criado no init." }
    MYSQL_USER:               { secret: false, default: "core_app", purpose: "Usuário de aplicação." }
    MYSQL_PASSWORD_FILE:      { secret: true,  purpose: "/run/secrets/mysql_app_password — senha do usuário de app." }
    MYSQL_PORT:               { secret: false, default: "3306", purpose: "Porta exposta (host)." }
  minio_dev:  # só desenvolvimento
    MINIO_ROOT_USER_FILE:     { secret: true,  purpose: "Credencial root do MinIO (dev)." }
    MINIO_ROOT_PASSWORD_FILE: { secret: true,  purpose: "Senha root do MinIO (dev)." }
    MINIO_API_PORT:           { secret: false, default: "9000" }
    MINIO_CONSOLE_PORT:       { secret: false, default: "9001" }
  docker_secrets_core_api:  # arquivos ./secrets/* (gerados por `pnpm secrets:setup` no core-api)
    - mysql_root_password
    - mysql_app_password
    - mysql_readonly_password   # declarado, sem consumidor Node hoje (reservado p/ BI/readonly)
    - auth_database_url
    - partners_database_url
    - contracts_database_url
    - programs_database_url
    - financial_database_url
    - migrate_database_url
    - minio_root_user
    - minio_root_password
  ci_secrets:
    web_app: [TS_AUTHKEY, GITHUB_TOKEN]
    core_api: [DEPLOY_SSH_KEY, GITHUB_TOKEN]   # deploy QA do core-api (legado SSH); GITHUB_TOKEN automático

# #############################################################################
# 4) CHECKLIST MÍNIMO PARA SUBIR A APLICAÇÃO COMPLETA (prod/QA)
# #############################################################################
# Marque tudo antes de subir. As linhas ⚠️ são as que já causaram (ou causariam) incidente.
checklist_minimo:
  web_app:
    - "⚠️ CORE_API_URL setada e TERMINANDO EM /api/v2 (ou /api). Sem isso → login 404 → 'server'. (boot fail-fast agora barra)"
    - "PORT/HOST/NODE_ENV/NODE_OPTIONS conforme o envelope do container (defaults seguros existem)."
    - "Deploy: TS_AUTHKEY válida no GitHub Secrets (rotacionar antes de 2026-09-23 — issue #92)."
  core_api:
    - "Os 5 drivers = mysql: AUTH/PARTNERS/CONTRACTS/PROGRAMS/FINANCIAL_DRIVER."
    - "As connection strings de cada módulo (AUTH/PARTNERS/CONTRACTS/PROGRAMS/FINANCIAL_DATABASE_URL) + MIGRATE_DATABASE_URL (job migrate)."
    - "⚠️ AUTH_JWT_PRIVATE_KEY + AUTH_JWT_PUBLIC_KEY (ES256 PEM) — em prod, senão os tokens não sobrevivem a restart."
    - "⚠️ S3_REGION + S3_BUCKET (obrigatórias com CONTRACTS_DRIVER=mysql; lançam no boot) + credenciais (estáticas XOR IAM Role)."
    - "E-mail: EMAIL_FROM + (SMTP_HOST/PORT/SECURE/USER/SMTP_PASS) OU RESEND_API_KEY — senão e-mails viram no-op."
    - "AUTH_RESET_BASE_URL = URL pública do FRONT (link de reset)."
    - "NODE_ENV=production (esconde /docs). TRUST_PROXY = CIDR do proxy (não 'true' aberto)."
    - "CORS_ORIGINS só se houver consumidor != BFF (mobile/integrações)."
    - "Rodar o job `migrate` ANTES do http/workers."

# #############################################################################
# 5) ARMADILHAS CONHECIDAS (gotchas) — leia antes de debugar
# #############################################################################
gotchas:
  - "web-app: CORE_API_URL sem /api → /auth/* 404 → 'server' silencioso. O /ready do front só sondava /health do host (passava). Corrigido: refine no boot + /ready 503 (ADR-0020 emenda)."
  - "core-api: sem <MOD>_DRIVER=mysql, o módulo sobe IN-MEMORY (parece ok, mas não persiste)."
  - "core-api: S3_REGION/S3_BUCKET parecem opcionais no .env.example, mas são OBRIGATÓRIAS com CONTRACTS_DRIVER=mysql (lançam no boot)."
  - "core-api: AUTH_JWT_* ausentes → par efêmero no boot (login some a cada restart). Sempre setar em prod."
  - "core-api: handbook/infrastructure/03-secrets-catalog.md é PARCIALMENTE LEGADO (cita Bradesco/OIDC/Postgres/JWT_SIGNING_KEY que NÃO existem no código). Este YAML é a referência correta."
  - "core-api: .env.example está incompleto vs o código (não lista JWT, drivers, CORS, TRUST_PROXY, OUTBOX_*, PROGRAMS_LOGO_S3_*, MIGRATE_DATABASE_URL)."
  - "MAGALU_* e mysql_readonly_password existem mas NÃO são consumidos no boot atual (futuro/BI)."
